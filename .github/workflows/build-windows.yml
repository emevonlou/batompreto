name: Build Windows Installer

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name batompreto --icon=icon.png --add-data "icon.png;." app.py

      - name: Create ICO
        run: |
          python - <<'PY'
          from PIL import Image
          img = Image.open("icon.png")
          img.save("icon.ico", sizes=[(256,256), (128,128), (64,64), (48,48), (32,32), (16,16)])
          PY

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build Installer
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss'

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: batompreto-windows-installer
          path: dist/batompreto-setup.exe
